name: Deploy Congklak to GitHub Pages

# Public playtest URL for the Congklak vertical slice (ARC-6).
# Deploys the self-contained single-file build to GitHub Pages on every push to main.

# NOTE: trigger is manual-only for now. The host account has GitHub Actions
# disabled by a billing lock, so push-triggered runs only fail noisily. Until
# that's resolved the live site is served from the `gh-pages` branch (see
# scripts/deploy-pages.sh). Once Actions is unlocked, switch the Pages source
# back to "GitHub Actions" and restore the `push:` trigger below.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Typecheck + tests
        run: |
          npm run typecheck
          npm test

      - name: Build self-contained game
        run: npm run build:standalone

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp dist-standalone/congklak.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
