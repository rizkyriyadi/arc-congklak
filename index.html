<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arc Entertainment — Game Foundation</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d1117;
        color: #e6edf3;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        min-height: 100%;
        padding: 16px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #f0c674;
      }
      p.subtitle {
        margin: 0;
        font-size: 0.85rem;
        opacity: 0.6;
      }
      canvas {
        border: 1px solid #30363d;
        border-radius: 8px;
        background: #161b22;
        max-width: 100%;
        height: auto;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Arc Entertainment</h1>
      <p class="subtitle">Game foundation — the loop is ticking.</p>
      <canvas id="game" width="800" height="450"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
